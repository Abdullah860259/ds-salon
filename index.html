<!DOCTYPE html>
<html>
<head>
    <title>Payment Required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .payment-box {
            background: white;
            padding: 30px;
            width: 350px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: green;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="payment-box">
    <h1>Payment Required</h1>

    <p>
        To continue using this website, please complete the payment
        to the website developer.
    </p>

    <div class="price">
        Rs. 10000 
    </div>

    <p>
        Payment Method: Easypaisa / JazzCash / Bank Transfer
    </p>

    <button onclick="payNow()">
        Pay Now
    </button>
</div>


<script>
function payNow(){
alert("Contact On 03134578476");
    // Add payment gateway link here
}   
</script>

</body>
</html>
